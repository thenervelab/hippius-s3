services:
  gateway:
    env_file:
      - .env.defaults
      - .env.test-docker
    environment:
      - HIPPIUS_BYPASS_CREDIT_CHECK=true
      - HIPPIUS_UPLOAD_BACKENDS=arion
      - HIPPIUS_DOWNLOAD_BACKENDS=arion
      - HIPPIUS_DELETE_BACKENDS=arion
    depends_on:
      api:
        condition: service_started
      arion-uploader:
        condition: service_started
      arion-downloader:
        condition: service_started

  api:
    build: .
    env_file:
      - .env.defaults
      - .env.test-docker
    environment:
      - HIPPIUS_KEY=${HIPPIUS_KEY}
      - HIPPIUS_UPLOAD_BACKENDS=arion
      - HIPPIUS_DOWNLOAD_BACKENDS=arion
      - HIPPIUS_DELETE_BACKENDS=arion
      # Drain-direct topology: the api writes parts to the node-local SSD cache; the
      # drain copies them to the shared pool (object_cache) that the uploader reads,
      # then unlinks the SSD copy. Reads fall back to the pool for drained parts.
      - HIPPIUS_OBJECT_CACHE_DIR=/var/lib/hippius/local_object_cache
      - HIPPIUS_OBJECT_CACHE_FALLBACK_DIR=/var/lib/hippius/object_cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-accounts:
        condition: service_healthy
      redis-chain:
        condition: service_healthy
      redis-rate-limiting:
        condition: service_healthy
      redis-queues:
        condition: service_healthy
      mock-kms:
        condition: service_healthy
    volumes:
      - .:/app
      - ./.e2e/dlq:/tmp/hippius_dlq
      - ./.e2e/dlq_archive:/tmp/hippius_dlq_archive
      - /var/lib/hippius/local_object_cache:/var/lib/hippius/local_object_cache
      - kms_certs:/kms_certs:ro
    networks:
      - hippius_net

  arion-uploader:
    env_file:
      - .env.defaults
      - .env.test-docker
    environment:
      - HIPPIUS_KEY=${HIPPIUS_KEY}
      - HIPPIUS_ARION_BASE_URL=http://toxiproxy:19090
      - HIPPIUS_UPLOAD_BACKENDS=arion
      - HIPPIUS_DOWNLOAD_BACKENDS=arion
      - HIPPIUS_DELETE_BACKENDS=arion
    volumes:
      - .:/app
      - ./.e2e/dlq:/tmp/hippius_dlq
      - ./.e2e/dlq_archive:/tmp/hippius_dlq_archive
      - kms_certs:/kms_certs:ro
    depends_on:
      mock-kms:
        condition: service_healthy
      mock-arion:
        condition: service_healthy

  arion-downloader:
    env_file:
      - .env.defaults
      - .env.test-docker
    environment:
      - HIPPIUS_KEY=${HIPPIUS_KEY}
      - HIPPIUS_ARION_BASE_URL=http://toxiproxy:19090
      - HIPPIUS_UPLOAD_BACKENDS=arion
      - HIPPIUS_DOWNLOAD_BACKENDS=arion
      - HIPPIUS_DELETE_BACKENDS=arion

  mock-hippius-api:
    build:
      context: .
      dockerfile: tests/e2e/Dockerfile.mock-api
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      - HIPPIUS_AUTH_ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    depends_on:
      toxiproxy:
        condition: service_started
    networks:
      - hippius_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c ''import httpx; httpx.get("http://localhost:8001/health", timeout=1).raise_for_status()'' || exit 1',
        ]
      interval: 5s
      timeout: 3s
      retries: 5

  mock-arion:
    build:
      context: .
      dockerfile: tests/e2e/Dockerfile.mock-arion
    ports:
      - "127.0.0.1:8002:8002"
    networks:
      - hippius_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c ''import httpx; httpx.get("http://localhost:8002/health", timeout=1).raise_for_status()'' || exit 1',
        ]
      interval: 5s
      timeout: 3s
      retries: 5

  mock-kms:
    build:
      context: .
      dockerfile: tests/e2e/Dockerfile.mock-kms
    ports:
      - "127.0.0.1:8443:8443"
    environment:
      - MOCK_KMS_MASTER_KEY=test-master-key-0123456789abcdef
      # Client cert optional for mock - healthcheck can't easily provide certs.
      # mTLS is still validated by actual api/worker connections which provide certs.
      - MOCK_KMS_REQUIRE_CLIENT_CERT=false
      - KMS_CERT_PATH=/certs/server.crt
      - KMS_KEY_PATH=/certs/server.key
      - KMS_CA_PATH=/certs/ca.crt
    volumes:
      - kms_certs:/certs
    networks:
      - hippius_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c ''import httpx; httpx.get("https://localhost:8443/health", timeout=1, verify=False).raise_for_status()'' || exit 1',
        ]
      interval: 5s
      timeout: 3s
      retries: 5

  toxiproxy:
    image: shopify/toxiproxy:latest
    ports:
      - "8474:8474"
    depends_on:
      - mock-arion
    networks:
      - hippius_net

  account-cacher:
    env_file:
      - .env.defaults
      - .env.test-docker
    environment:
      - HIPPIUS_KEY=${HIPPIUS_KEY}
      - HIPPIUS_UPLOAD_BACKENDS=arion
      - HIPPIUS_DOWNLOAD_BACKENDS=arion
      - HIPPIUS_DELETE_BACKENDS=arion
    volumes:
      - .:/app

  janitor:
    env_file:
      - .env.defaults
      - .env.test-docker
    environment:
      - HIPPIUS_KEY=${HIPPIUS_KEY}
      - HIPPIUS_UPLOAD_BACKENDS=arion
      - HIPPIUS_DOWNLOAD_BACKENDS=arion
      - HIPPIUS_DELETE_BACKENDS=arion
    volumes:
      - .:/app

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
    networks:
      - hippius_net

  redis-accounts:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
    networks:
      - hippius_net

  redis-chain:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
    networks:
      - hippius_net

  redis-rate-limiting:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6383:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
    networks:
      - hippius_net

  redis-queues:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6382:6379"
    command:
      [
        "redis-server",
        "--maxmemory",
        "2gb",
        "--maxmemory-policy",
        "allkeys-lru",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
      ]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
    networks:
      - hippius_net

  # The hippius-drain stack — the sole producer of backend upload requests after this
  # change. Without it the e2e api (which no longer enqueues at PUT) would never have its
  # parts uploaded. The allocator owns + migrates the cephor_* schema and hands the agent
  # a write budget; the agent reconciles the SSD cache, copies each complete part to the
  # shared pool, and LPUSHes its UploadChainRequest to the upload queue.
  drain-allocator:
    build:
      context: .
      dockerfile: Dockerfile.drain
    command: ["/usr/local/bin/hippius-drain-allocator"]
    environment:
      - CEPHOR_DATABASE_URL=postgresql://postgres:postgres@db:5432/hippius?sslmode=disable
      - CEPHOR_ALLOCATOR_INSTANCE_ID=e2e-allocator
      - RUST_LOG=info
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hippius_net

  drain-agent:
    build:
      context: .
      dockerfile: Dockerfile.drain
    command: ["/usr/local/bin/hippius-drain-agent"]
    environment:
      - CEPHOR_DATABASE_URL=postgresql://postgres:postgres@db:5432/hippius?sslmode=disable
      - CEPHOR_NODE_ID=e2e-node
      - CEPHOR_SSD_ROOT=/var/lib/hippius/local_object_cache
      - CEPHOR_POOL_ROOT=/var/lib/hippius/object_cache
      - REDIS_QUEUES_URL=redis://redis-queues:6379
      - HIPPIUS_UPLOAD_BACKENDS=arion
      # Tight polls + short deferral backoff so a freshly-landed (and a just-completed
      # MPU's) part drains within the e2e wait windows.
      - CEPHOR_RECONCILE_POLL_SECS=2
      - CEPHOR_DRAIN_POLL_SECS=1
      - CEPHOR_DEFER_BACKOFF_SECS=2
      # e2e does not exercise rate limiting; give the drain effectively-unlimited
      # bandwidth so the token bucket never depletes across the suite and parts
      # replicate within the tests' backend-ready wait windows.
      - CEPHOR_FLOOR_RATE_BPS=10000000000
      - CEPHOR_MAX_DRAIN_RATE_BPS=10000000000
      - RUST_LOG=hippius_drain_agent=debug,info
    volumes:
      - /var/lib/hippius/local_object_cache:/var/lib/hippius/local_object_cache
      - /var/lib/hippius/object_cache:/var/lib/hippius/object_cache
    depends_on:
      db:
        condition: service_healthy
      redis-queues:
        condition: service_healthy
      drain-allocator:
        condition: service_started
    # The allocator migrates the cephor_* schema on startup; if the agent races ahead of
    # that its first query errors and it exits — restart retries until the tables exist.
    restart: unless-stopped
    networks:
      - hippius_net

volumes:
  kms_certs:

networks:
  hippius_net:
    name: hippius_net
