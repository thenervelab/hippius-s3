# cargo-deny configuration (run in CI: `cargo deny check`).
[advisories]
yanked = "deny"

[licenses]
# Permissive licenses compatible with this crate's MIT OR Apache-2.0 dual license.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcard-dependencies = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
