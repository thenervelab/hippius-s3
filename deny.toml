# cargo-deny configuration (run in CI: `cargo deny check`).
[advisories]
# Advisory gate (audit F13). In the current cargo-deny schema a matched advisory
# (vulnerability/unsound/etc.) always fails `cargo deny check` — there is no per-class
# severity knob — so a known-vulnerable dep blocks the build by default. We additionally
# deny yanked crates and scope the unmaintained-advisory check to the workspace graph.
yanked = "deny"
unmaintained = "workspace"

[licenses]
# Permissive licenses compatible with this crate's MIT OR Apache-2.0 dual license.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
