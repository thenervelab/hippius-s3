name: Production Smoke Tests

on:
  schedule:
    - cron: '0 * * * *'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-tests:
    name: Smoke Tests (s3.hippius.com)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: production-smoke-tests
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r tests/smoke/requirements.txt

      - name: Run smoke tests against s3.hippius.com
        env:
          AWS_ACCESS_KEY: ${{ secrets.HIPPIUS_PROD_ACCESS_KEY }}
          AWS_SECRET_KEY: ${{ secrets.HIPPIUS_PROD_SECRET_KEY }}
        run: |
          mkdir -p reports
          pytest tests/smoke/test_smoke_production.py \
            -v \
            --tb=short \
            -W "ignore::DeprecationWarning:botocore" \
            -W "ignore::DeprecationWarning:dateutil" \
            --json-report \
            --json-report-file=reports/smoke-production.json

      - name: Run smoke tests against regional caches
        if: always()
        env:
          AWS_ACCESS_KEY: ${{ secrets.HIPPIUS_PROD_ACCESS_KEY }}
          AWS_SECRET_KEY: ${{ secrets.HIPPIUS_PROD_SECRET_KEY }}
        run: |
          mkdir -p reports
          pytest tests/smoke/test_smoke_regional.py \
            -n auto \
            -v \
            --tb=short \
            -W "ignore::DeprecationWarning:botocore" \
            -W "ignore::DeprecationWarning:dateutil" \
            --json-report \
            --json-report-file=reports/smoke-regional.json

      - name: Run sub-token scope smoke tests against s3.hippius.com
        if: always()
        env:
          AWS_ACCESS_KEY: ${{ secrets.HIPPIUS_PROD_ACCESS_KEY }}
          AWS_SECRET_KEY: ${{ secrets.HIPPIUS_PROD_SECRET_KEY }}
          HIPPIUS_ENDPOINT: https://s3.hippius.com
          FRONTEND_HMAC_SECRET: ${{ secrets.FRONTEND_HMAC_SECRET_PROD }}
          HIPPIUS_USER_TOKEN: ${{ secrets.HIPPIUS_USER_TOKEN_PROD }}
          HIPPIUS_MASTER_ACCOUNT_ID: ${{ secrets.HIPPIUS_MASTER_ACCOUNT_ID_PROD }}
        run: |
          mkdir -p reports
          pytest tests/smoke/test_smoke_subtoken_scope.py \
            -v \
            --tb=short \
            -m smoke_subtoken \
            -W "ignore::DeprecationWarning:botocore" \
            -W "ignore::DeprecationWarning:dateutil" \
            --json-report \
            --json-report-file=reports/smoke-subtoken-scope.json

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results-${{ github.run_id }}
          path: reports/
          retention-days: 90

      - name: Check test status
        if: failure()
        run: |
          echo "Smoke tests failed - check artifacts"
          echo "Run ID: ${{ github.run_id }}"
