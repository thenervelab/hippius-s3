# APPLY job for the recent_uploads index migration.
# Builds the per-bucket composite index CONCURRENTLY (no write lock on objects),
# validates the result, then inserts the schema_migrations row so dbmate skips
# the corresponding committed migration on the next deploy.
#
# Pre-flight (REQUIRED):
#   1. Run the dryrun job, review its output. Confirm:
#      - no INVALID indexes on objects
#      - no long-running transactions older than ~1 minute
#      - schema_migrations row 20260427160000 is absent
#      - we're outside the backup window
#   2. Pause CI/CD deploys to hippius-s3-prod for the duration of this build
#      (5-30 min expected; cap is 2h). A deploy in flight will queue behind the
#      build's lock and the deploy's db-migrations job may time out.
#
# Run with:   kubectl create -f k8s/migrate-recent-uploads-index-apply.yaml
# Watch:      kubectl -n hippius-s3-prod logs job/migrate-recent-uploads-index-apply --follow
# In another shell, monitor build progress:
#   kubectl -n hippius-s3-prod exec postgres-1 -c postgres -- psql -U postgres -d hippius -c \
#     "SELECT now(), phase, blocks_done, blocks_total FROM pg_stat_progress_create_index WHERE relid='public.objects'::regclass;"
#
# Re-run after a failure (only after manual cleanup of any INVALID index — see job logs):
#   kubectl -n hippius-s3-prod delete job migrate-recent-uploads-index-apply
#   kubectl -n hippius-s3-prod exec postgres-1 -c postgres -- psql -U postgres -d hippius -c \
#     "DROP INDEX CONCURRENTLY IF EXISTS idx_objects_bucket_last_modified_active;"
#   kubectl create -f k8s/migrate-recent-uploads-index-apply.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-recent-uploads-index-apply
  namespace: hippius-s3-prod
  labels:
    app: migrate-recent-uploads-index
    mode: apply
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 7200
  ttlSecondsAfterFinished: 604800
  template:
    metadata:
      labels:
        app: migrate-recent-uploads-index
        mode: apply
    spec:
      restartPolicy: Never
      containers:
        - name: apply
          image: postgres:15
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hippius-s3-secrets
                  key: DATABASE_URL
            - name: PGCONNECT_TIMEOUT
              value: "10"
            - name: MIGRATION_VERSION
              value: "20260427160000"
            - name: INDEX_NAME
              value: "idx_objects_bucket_last_modified_active"
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              echo "=== sanity: confirming target database ==="
              CURDB=$(psql "$DATABASE_URL" -tA -c "SELECT current_database();")
              if [ "$CURDB" != "hippius" ]; then
                echo "ABORT: expected database 'hippius', got '$CURDB'"
                exit 1
              fi
              echo "connected to database: $CURDB"

              echo
              echo "=== pre-flight: no leftover INVALID index from prior run ==="
              INVALID_COUNT=$(psql "$DATABASE_URL" -tA -c "
                SELECT count(*) FROM pg_index i
                JOIN pg_class c ON c.oid = i.indexrelid
                WHERE c.relname = '${INDEX_NAME}' AND NOT i.indisvalid;
              ")
              if [ "$INVALID_COUNT" != "0" ]; then
                echo "ABORT: an INVALID index named '${INDEX_NAME}' already exists from a prior failed attempt."
                echo "Operator must run (in another shell, NOT in a transaction):"
                echo "  DROP INDEX CONCURRENTLY IF EXISTS ${INDEX_NAME};"
                echo "Then re-run this job."
                exit 1
              fi

              echo "=== pre-flight: schema_migrations row for ${MIGRATION_VERSION} ==="
              ALREADY_APPLIED=$(psql "$DATABASE_URL" -tA -c "
                SELECT count(*) FROM schema_migrations WHERE version = '${MIGRATION_VERSION}';
              ")
              if [ "$ALREADY_APPLIED" != "0" ]; then
                echo "NOTE: schema_migrations already records ${MIGRATION_VERSION} as applied."
                echo "Will still verify the index is VALID and exit cleanly if so."
              fi

              echo
              echo "=== building index (CONCURRENTLY, no write lock on objects) ==="
              echo "expected duration: 5-30 min; activeDeadlineSeconds=7200"
              echo "started at: $(date -u +%FT%TZ)"

              # CONCURRENTLY cannot run inside a transaction. psql with -c runs each
              # statement in its own implicit transaction; setting session params via
              # PGOPTIONS so they apply to the CREATE INDEX without needing a SET
              # statement (which would attach the SET to the same implicit tx).
              PGOPTIONS="-c lock_timeout=0 -c statement_timeout=0 -c idle_in_transaction_session_timeout=0" \
                psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "
                  CREATE INDEX CONCURRENTLY IF NOT EXISTS ${INDEX_NAME}
                    ON public.objects (bucket_id, last_modified DESC)
                    WHERE deleted_at IS NULL;
                "

              echo "build returned at: $(date -u +%FT%TZ)"

              echo
              echo "=== validating: index must be present and indisvalid=true ==="
              VALIDITY=$(psql "$DATABASE_URL" -tA -c "
                SELECT indisvalid::text
                FROM pg_index i
                JOIN pg_class c ON c.oid = i.indexrelid
                WHERE c.relname = '${INDEX_NAME}';
              ")
              if [ "$VALIDITY" != "t" ]; then
                echo "ABORT: index ${INDEX_NAME} is not VALID (indisvalid=${VALIDITY:-MISSING})."
                echo "Operator must investigate. To re-attempt:"
                echo "  DROP INDEX CONCURRENTLY IF EXISTS ${INDEX_NAME};  -- in a separate session"
                echo "  kubectl -n hippius-s3-prod delete job migrate-recent-uploads-index-apply"
                echo "  kubectl create -f k8s/migrate-recent-uploads-index-apply.yaml"
                exit 1
              fi
              echo "index ${INDEX_NAME} is VALID."

              echo
              echo "=== marking migration ${MIGRATION_VERSION} as applied in schema_migrations ==="
              psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "
                INSERT INTO public.schema_migrations (version)
                VALUES ('${MIGRATION_VERSION}')
                ON CONFLICT (version) DO NOTHING;
              "

              echo
              echo "=== final state ==="
              psql "$DATABASE_URL" -c "
                SELECT version FROM schema_migrations WHERE version = '${MIGRATION_VERSION}';
              "
              psql "$DATABASE_URL" -c "
                SELECT indexname, indexdef FROM pg_indexes
                WHERE indexname = '${INDEX_NAME}';
              "

              echo
              echo "=== apply complete at: $(date -u +%FT%TZ) ==="
              echo "next step: deploy normally. dbmate will see ${MIGRATION_VERSION} already applied and skip it."
              echo "reminder: do NOT commit the drop migration (20260427160001) until the new index is observed working in prod."
