# Trial (s3-2.0 prototype): the cache-replicator (ceph drainer) DaemonSet.
#
# Drains each node's local-SSD ingest dir to the shared CephFS cache. One pod per
# node, on EXACTLY the node set the api-local pods can land on.
#
# == How node alignment is guaranteed ==
# Both this DaemonSet and the api-local Deployment select the SAME node label
# `s3-staging-local-ingest=true` (the ONE list lives in ingest-node-labels-staging.yaml).
# A DaemonSet runs one pod per matching node, so it covers every node an api pod can
# land on — in lockstep by construction, no duplicated hostname list to drift. The
# label also keeps the replicator OFF node6-cache (untainted, so a bare DaemonSet
# would otherwise land there) and the psql/master nodes.
#
# == Volume access ==
#  * Local disk: the SAME hostPath the api pods write to (node-local),
#    /var/lib/hippius/local_ingest_staging — the `_staging` denominator keeps it
#    disjoint from prod's /var/lib/hippius/local_ingest_prod even on a shared node.
#    Mounted RW so the daemon can mark-replicated / reclaim after ceph confirms.
#  * Shared cache: object-cache-pvc — ReadWriteMany ceph-filesystem (already
#    provisioned + Bound), so every replicator pod mounts it concurrently. Mounted
#    RW (the api pods mount it read-only; the replicator is the writer into ceph).
#
# == NOT YET ENABLED ==
# The daemon image does not exist yet. This file is a valid manifest but is left
# OUT of kustomization.yaml. When the drainer image ships: set `image:` below and
# add `- replicator-daemonset-staging.yaml` to kustomization.yaml resources.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cache-replicator
  labels:
    app: cache-replicator
spec:
  selector:
    matchLabels:
      app: cache-replicator
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: cache-replicator
    spec:
      # Same label as api-local — keeps them in lockstep (see header).
      nodeSelector:
        s3-staging-local-ingest: "true"
      initContainers:
        - name: prepare-ingest-dir
          image: busybox
          command:
            - sh
            - -c
            - mkdir -p /var/lib/hippius/local_object_cache && chmod 0777 /var/lib/hippius/local_object_cache
          volumeMounts:
            - name: local-ingest
              mountPath: /var/lib/hippius/local_object_cache
      containers:
        - name: cache-replicator
          # TODO: set to the drainer entrypoint image once built.
          image: ghcr.io/thenervelab/hippius-s3/workers:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: hippius-s3-defaults
            - configMapRef:
                name: hippius-s3-environment
            - secretRef:
                name: hippius-s3-secrets
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Source (node-local ingest) + destination (shared ceph cache).
            - name: HIPPIUS_OBJECT_CACHE_DIR
              value: /var/lib/hippius/local_object_cache
            - name: HIPPIUS_OBJECT_CACHE_FALLBACK_DIR
              value: /var/lib/hippius/object_cache
          volumeMounts:
            - name: local-ingest
              mountPath: /var/lib/hippius/local_object_cache
            - name: object-cache
              mountPath: /var/lib/hippius/object_cache
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
      volumes:
        - name: local-ingest
          hostPath:
            path: /var/lib/hippius/local_ingest_staging
            type: DirectoryOrCreate
        - name: object-cache
          persistentVolumeClaim:
            claimName: object-cache-pvc
