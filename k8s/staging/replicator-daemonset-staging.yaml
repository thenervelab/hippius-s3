# Trial (s3-2.0 prototype): PLACEHOLDER for the cache-replicator daemon.
#
# This is the linchpin component (see s3-2.0 §8). It is NOT built yet — this file
# documents where it slots in and is intentionally LEFT OUT of kustomization.yaml
# until the daemon image exists. Until it runs, anything ingested on the local
# tier (api-local-*) is invisible to the ceph-reading workers (arion-uploader,
# backup) and to GETs served by ceph api pods.
#
# What it must do (per s3-2.0 §8), reusing existing primitives:
#   - run on each ingest node (DaemonSet pinned to the same nodes as api-local-*),
#   - watch the node-local ingest dir for parts whose meta.json has landed,
#   - copy chunks -> CephFS (object-cache-pvc) META-LAST (reuse fs_store atomic
#     uuid-tmp + os.replace writes), then ring notify:{chunk} on redis-queues
#     (reuse ChunkNotifier) so streamers/uploaders waiting on pub/sub wake up,
#   - mark replicated; never delete local before ceph confirms,
#   - rescan the ingest dir on restart (local SSD IS the to-do list),
#   - bound concurrency via a shared semaphore + emit a replication-lag metric.
#
# Sketch (uncomment + set image once the daemon ships):
