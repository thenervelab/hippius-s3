# Patch: Pin every pod that reads/writes the FS cache onto the cache node.
# The local NVMe volume (local-cache-pvc) is attached to k8s-v3-node6-cache;
# pods must run there to access it.
#
# Applies to: api, arion-uploader, arion-downloader, janitor. The s3-hydrator
# from the s3-backup repo requires an equivalent patch in its own manifests.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-v3-node6-cache
      containers:
        - name: api
          volumeMounts:
            - name: local-cache
              mountPath: /var/lib/hippius/local_object_cache
            - name: object-cache
              mountPath: /var/lib/hippius/object_cache
              readOnly: true
      volumes:
        - name: local-cache
          persistentVolumeClaim:
            claimName: local-cache-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arion-uploader
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-v3-node6-cache
      containers:
        - name: arion-uploader
          volumeMounts:
            - name: local-cache
              mountPath: /var/lib/hippius/local_object_cache
            - name: object-cache
              mountPath: /var/lib/hippius/object_cache
              readOnly: true
      volumes:
        - name: local-cache
          persistentVolumeClaim:
            claimName: local-cache-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arion-downloader
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-v3-node6-cache
      containers:
        - name: arion-downloader
          volumeMounts:
            - name: local-cache
              mountPath: /var/lib/hippius/local_object_cache
            - name: object-cache
              mountPath: /var/lib/hippius/object_cache
              readOnly: true
      volumes:
        - name: local-cache
          persistentVolumeClaim:
            claimName: local-cache-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: janitor
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-v3-node6-cache
      containers:
        - name: janitor
