apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hippius-s3-prod

resources:
  - ../base
  - postgres-objectstore.yaml
  - postgres-nvme-objectstore.yaml
  - postgres-nvme-cluster.yaml
  - postgres-nvme-scheduledbackup.yaml
  - gateway-nodeport.yaml
  - pv-local-cache.yaml
  - pvc-local-cache.yaml

patches:
  - path: namespace-patch.yaml
  - path: environment-patch.yaml
  - path: resource-limits.yaml
  - path: postgres-tuning.yaml
  - path: redis-tuning.yaml
  - path: ingress-patch.yaml
  - path: services-patch.yaml
  - path: local-cache-patch.yaml
  - path: local-cache-configmap-patch.yaml
  - path: postgres-nvme-initwait-patch.yaml

images:
  - name: ghcr.io/thenervelab/hippius-s3/api
    newTag: latest
  - name: ghcr.io/thenervelab/hippius-s3/gateway
    newTag: latest
  - name: ghcr.io/thenervelab/hippius-s3/workers
    newTag: latest
