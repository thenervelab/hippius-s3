# Prod-only override: point the init-container DB readiness waits at the NVMe
# cluster (postgres-rw) instead of the Ceph cluster (postgres-rw).
#
# This lives in the PRODUCTION overlay only. The shared base (k8s/base) keeps
# `postgres-rw` so STAGING — which has no postgres-nvme cluster — is unaffected.
# Required before decommissioning the Ceph `postgres` cluster, otherwise these
# gates would hang once the postgres-rw Service is removed.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  template:
    spec:
      initContainers:
        - name: wait-for-postgres
          command:
            - sh
            - -c
            - until pg_isready -h postgres-rw -p 5432 -U postgres; do echo waiting for postgres; sleep 5; done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arion-uploader
spec:
  template:
    spec:
      initContainers:
        - name: wait-for-services
          command:
            - sh
            - -c
            - until nc -z postgres-rw 5432 && nc -z redis 6379 && nc -z redis-queues 6379; do echo waiting for services; sleep 5; done
---
