deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2020-10-24"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  storage:
    type: filesystem
  limits_config:
    ingestion_rate_mb: 8
    ingestion_burst_size_mb: 16
    retention_period: 168h
    max_query_length: 168h
    # Single-binary on a few cores: high fan-out turns one Explore load into a
    # CPU-starving storm of split subqueries. Keep parallelism bounded.
    max_query_parallelism: 8

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    # Matches the live PVC (resized to 350Gi in prod). The volumeClaimTemplate is
    # immutable — this MUST equal the bound PVC or helm upgrade is rejected.
    size: 350Gi
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 8Gi

gateway:
  enabled: false

read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0

chunksCache:
  enabled: true
  allocatedMemory: 1024

resultsCache:
  enabled: true
  allocatedMemory: 512
