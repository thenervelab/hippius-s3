apiVersion: v1
kind: PersistentVolume
metadata:
  name: local-cache-pv-us-0
spec:
  capacity:
    storage: 2Ti
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  local:
    path: /cache
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: hippius.com/cache-region
              operator: In
              values:
                - us-0
