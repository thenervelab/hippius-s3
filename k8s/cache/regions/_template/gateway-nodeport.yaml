apiVersion: v1
kind: Service
metadata:
  name: gateway-nodeport
  labels:
    app: gateway
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
      # Assign next available port: us-0=30090, eu-0=30091, ...
      nodePort: 30092
