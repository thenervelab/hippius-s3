apiVersion: apps/v1
kind: Deployment
metadata:
  name: arion-downloader

spec:
  replicas: 1
  selector:
    matchLabels:
      app: arion-downloader
  template:
    metadata:
      labels:
        app: arion-downloader
        worker-type: downloader
        backend: arion
    spec:
      initContainers:
        - name: wait-for-services
          image: busybox:1.35
          command:
            - sh
            - -c
            - until nc -z postgres-rw 5432 && nc -z redis-queues 6379; do echo waiting for services; sleep 5; done
      containers:
        - name: arion-downloader
          image: ghcr.io/thenervelab/hippius-s3/workers:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: hippius-s3-defaults
            - configMapRef:
                name: hippius-s3-environment
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=$(ENVIRONMENT),service.namespace=$(K8S_NAMESPACE),service.instance.id=$(POD_NAME)"
            - name: WORKER_SCRIPT
              value: "workers/run_arion_downloader_in_loop.py"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hippius-s3-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: hippius-s3-secrets
                  key: REDIS_URL
            - name: REDIS_QUEUES_URL
              valueFrom:
                secretKeyRef:
                  name: hippius-s3-secrets
                  key: REDIS_QUEUES_URL
            - name: REDIS_DOWNLOAD_CACHE_URL
              valueFrom:
                secretKeyRef:
                  name: hippius-s3-secrets
                  key: REDIS_DOWNLOAD_CACHE_URL
            - name: HIPPIUS_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: hippius-s3-secrets
                  key: HIPPIUS_SERVICE_KEY
            - name: ARION_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: hippius-s3-secrets
                  key: ARION_SERVICE_KEY
            - name: ARION_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hippius-s3-secrets
                  key: ARION_BEARER_TOKEN
            - name: ARION_RATE_LIMITING_PROXY_BYPASS_KEY
              valueFrom:
                secretKeyRef:
                  name: hippius-s3-secrets
                  key: ARION_RATE_LIMITING_PROXY_BYPASS_KEY
            - name: HIPPIUS_AUTH_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: hippius-s3-secrets
                  key: HIPPIUS_AUTH_ENCRYPTION_KEY
            - name: HIPPIUS_ARION_BASE_URL
              value: "HIPPIUS_ARION_BASE_URL_PLACEHOLDER"
            - name: HIPPIUS_ARION_VERIFY_SSL
              value: "HIPPIUS_ARION_VERIFY_SSL_PLACEHOLDER"
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: hippius-s3-secrets
                  key: DISCORD_WEBHOOK_URL
            - name: RESUBMISSION_SEED_PHRASE
              valueFrom:
                secretKeyRef:
                  name: hippius-s3-secrets
                  key: RESUBMISSION_SEED_PHRASE
            - name: HIPPIUS_OVH_KMS_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: hippius-s3-secrets
                  key: HIPPIUS_OVH_KMS_ENDPOINT
            - name: HIPPIUS_OVH_KMS_DEFAULT_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: hippius-s3-secrets
                  key: HIPPIUS_OVH_KMS_DEFAULT_KEY_ID
            - name: HIPPIUS_OVH_KMS_OKMS_ID
              valueFrom:
                secretKeyRef:
                  name: hippius-s3-secrets
                  key: HIPPIUS_OVH_KMS_OKMS_ID
            - name: FRONTEND_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: hippius-s3-secrets
                  key: FRONTEND_HMAC_SECRET
          # No object-cache PVC: downloaders write to Redis only in cache mode
          volumeMounts:
            - name: kms-certs
              mountPath: /kms_certs
              readOnly: true
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "test -d /proc/1 && grep -q python /proc/1/cmdline"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
      volumes:
        - name: kms-certs
          secret:
            secretName: ovh-kms-certs
            defaultMode: 0400
