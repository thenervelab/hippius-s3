apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
# postgres-rw: ExternalName pointing to main cluster's PostgreSQL
# Overridden per region to point to the correct main namespace
apiVersion: v1
kind: Service
metadata:
  name: postgres-rw
spec:
  type: ExternalName
  externalName: postgres-rw.hippius-s3-prod.svc.cluster.local
